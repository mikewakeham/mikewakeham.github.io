# Research projects (shown on the home page, newest first).
#
# Add a new paper: duplicate the YAML block starting with "- id: ..." and paste above
# or below other entries (order = display order; newest first is typical).
#
# Fields:
#   id            — short slug for HTML id (e.g. my-paper-name)
#   teaser        — image path: assets/images/foo.png (omit if using teaser_video)
#   teaser_video  — optional MP4 path for looping video teaser instead of teaser image
#   title         — full paper title (quoted if it has colons)
#   venue         — e.g. CVPR 2026
#   description   — optional short blurb (use instead of authors for WIP items)
#   arxiv_abs     — https://arxiv.org/abs/XXXX (optional); “arXiv” link
#   arxiv_pdf     — PDF URL (optional). With arxiv_abs: second link “PDF”. Alone: single “arXiv” link to this URL.
#   project_page  — project website (optional)
#   code_url      — GitHub or other code link (optional; omit key if none)
#   code_label    — optional link text (default: code), e.g. "code (outdated)"
#   authors       — list of { name: "...", url: "...", self: true, mark: "..." }
#                   url optional; self: true = your name (underlined, no link); mark optional
#   footnote      — optional line under authors (equal contrib., etc.)
#

